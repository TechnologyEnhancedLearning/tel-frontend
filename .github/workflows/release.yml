name: Publish npm Package

on:
  push:
    branches:
      - TD-7283-Tel-frontend-create-github-workflow-file-for-npm-package-creation

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # If your project requires a build step to compile JS/CSS components before shipping
      - run: npm run build 

      - name: Publish to npm
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}